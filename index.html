<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Manager SaaS</title>
  <style>
    /* CSS Variables */
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --sidebar-width: 240px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Layout */
    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.5rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-menu {
      list-style: none;
      padding: 20px 10px;
    }

    .nav-item {
      margin-bottom: 5px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-link:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-link.active {
      background: var(--accent);
      color: white;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      padding: 5px;
    }

    .hamburger svg {
      width: 24px;
      height: 24px;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .search-container {
      position: relative;
    }

    .search-input {
      padding: 10px 15px 10px 40px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      width: 300px;
      font-size: 0.9rem;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 5px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 1000;
    }

    .search-results.show {
      display: block;
    }

    .search-result-item {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover {
      background: var(--bg-primary);
    }

    .search-result-item .highlight {
      color: var(--accent);
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
    }

    /* Content Area */
    .content {
      padding: 30px;
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
    }

    .summary-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .summary-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .summary-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .summary-card-icon.blue { background: rgba(59, 130, 246, 0.2); color: var(--info); }
    .summary-card-icon.green { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .summary-card-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .summary-card-icon.red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

    .summary-card-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .summary-card-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-description {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    /* Badges */
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--info); }
    .badge-secondary { background: rgba(148, 163, 184, 0.2); color: var(--text-secondary); }

    .priority-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .priority-low { background: var(--text-secondary); }
    .priority-medium { background: var(--info); }
    .priority-high { background: var(--warning); }
    .priority-critical { background: var(--danger); }

    /* Progress Bar */
    .progress-container {
      margin-top: 15px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* Member Avatars */
    .member-avatars {
      display: flex;
      gap: 5px;
      margin-top: 15px;
    }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      border: 2px solid var(--bg-card);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    .btn-icon {
      padding: 8px;
      border-radius: 6px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-icon:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Activity Feed */
    .activity-feed {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .activity-feed h3 {
      margin-bottom: 20px;
    }

    .activity-item {
      display: flex;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .activity-content {
      flex: 1;
    }

    .activity-text {
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .activity-time {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Kanban Board */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      overflow-x: auto;
    }

    .kanban-column {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      min-height: 400px;
    }

    .kanban-column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .kanban-column-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-count {
      background: var(--bg-primary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .kanban-column.drag-over {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    .task-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: grab;
      transition: all 0.2s ease;
    }

    .task-card:hover {
      border-color: var(--accent);
    }

    .task-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .task-card-title {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .task-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .task-card-assignee {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .task-card-assignee .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 600;
    }

    /* Table */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-filters {
      display: flex;
      gap: 15px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: var(--bg-primary);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      color: var(--text-primary);
    }

    th .sort-icon {
      margin-left: 5px;
      opacity: 0.5;
    }

    tr:hover {
      background: var(--bg-primary);
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Team Member Card */
    .team-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .team-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .team-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .team-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .team-role {
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .team-email {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 15px;
    }

    .team-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .team-stat {
      text-align: center;
    }

    .team-stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .team-stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Side Panel */
    .side-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      z-index: 200;
      transition: right 0.3s ease;
      overflow-y: auto;
    }

    .side-panel.open {
      right: 0;
    }

    .side-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .side-panel-content {
      padding: 20px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 5px;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 15px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .form-checkbox:hover {
      border-color: var(--accent);
    }

    .form-checkbox input:checked + span {
      color: var(--accent);
    }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-card h3 {
      margin-bottom: 20px;
    }

    .chart-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      max-width: 100%;
    }

    /* Quick Add Button */
    .quick-add-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: all 0.2s ease;
      z-index: 90;
    }

    .quick-add-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.1);
    }

    /* Inline Task Form */
    .inline-task-form {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
    }

    .inline-form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .inline-form-row:last-child {
      margin-bottom: 0;
    }

    .inline-form-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .hamburger {
        display: block;
      }

      .header {
        padding: 15px 20px;
      }

      .search-input {
        width: 200px;
      }

      .content {
        padding: 20px;
      }

      .kanban-board {
        grid-template-columns: 1fr;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .table-filters {
        flex-direction: column;
      }

      .filter-select {
        width: 100%;
      }

      .side-panel {
        width: 100%;
        right: -100%;
      }
    }

    /* Utility */
    .hidden { display: none !important; }
    .text-right { text-align: right; }
    .mt-20 { margin-top: 20px; }
    .mb-20 { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Team Manager
        </h1>
      </div>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="#dashboard" class="nav-link active" data-view="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="#projects" class="nav-link" data-view="projects">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            Projects
          </a>
        </li>
        <li class="nav-item">
          <a href="#tasks" class="nav-link" data-view="tasks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"></path>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            Tasks
          </a>
        </li>
        <li class="nav-item">
          <a href="#team" class="nav-link" data-view="team">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Team
          </a>
        </li>
        <li class="nav-item">
          <a href="#analytics" class="nav-link" data-view="analytics">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            Analytics
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <button class="hamburger" id="hamburger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search tasks, projects...">
          <div class="search-results" id="searchResults"></div>
        </div>
        <div class="header-right">
          <div class="user-avatar" id="userAvatar">A</div>
        </div>
      </header>

      <!-- Content -->
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- Quick Add Button -->
  <button class="quick-add-btn" id="quickAddBtn" title="Quick Add Task">+</button>

  <!-- Side Panel -->
  <div class="overlay" id="overlay"></div>
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <h2 id="sidePanelTitle">Member Details</h2>
      <button class="modal-close" id="sidePanelClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="side-panel-content" id="sidePanelContent"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal Title</h2>
        <button class="modal-close" id="modalClose">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script>
    // ==================== STATE MANAGEMENT ====================
    const state = {
      projects: [],
      tasks: [],
      members: [],
      activity: [],
      currentView: 'dashboard',
      currentProjectId: null,
      filters: {},
      sortColumn: null,
      sortDirection: 'asc'
    };

    // ==================== UTILITY FUNCTIONS ====================
    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function saveState() {
      localStorage.setItem('teamManagerState', JSON.stringify({
        projects: state.projects,
        tasks: state.tasks,
        members: state.members,
        activity: state.activity
      }));
    }

    function loadState() {
      const saved = localStorage.getItem('teamManagerState');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.projects = parsed.projects || [];
        state.tasks = parsed.tasks || [];
        state.members = parsed.members || [];
        state.activity = parsed.activity || [];
      } else {
        seedData();
      }
    }

    function logActivity(action, entityType) {
      state.activity.unshift({
        id: uuid(),
        action,
        timestamp: new Date().toISOString(),
        entityType
      });
      if (state.activity.length > 50) state.activity.pop();
      saveState();
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatRelativeTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return formatDate(isoString);
    }

    function isOverdue(dateStr) {
      return new Date(dateStr) < new Date() && new Date(dateStr).toDateString() !== new Date().toDateString();
    }

    // ==================== SEED DATA ====================
    function seedData() {
      const colors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#3b82f6', '#8b5cf6', '#ec4899'];
      
      // Members
      state.members = [
        { id: uuid(), name: 'Alex Johnson', role: 'Project Manager', email: 'alex@company.com', color: colors[0] },
        { id: uuid(), name: 'Sarah Chen', role: 'Lead Developer', email: 'sarah@company.com', color: colors[1] },
        { id: uuid(), name: 'Mike Wilson', role: 'UI/UX Designer', email: 'mike@company.com', color: colors[2] },
        { id: uuid(), name: 'Emily Brown', role: 'QA Engineer', email: 'emily@company.com', color: colors[3] },
        { id: uuid(), name: 'David Lee', role: 'DevOps Engineer', email: 'david@company.com', color: colors[4] }
      ];

      // Projects
      const project1 = { id: uuid(), name: 'Website Redesign', description: 'Complete overhaul of company website with modern design and improved UX', status: 'active', dueDate: '2026-04-15', memberIds: [state.members[0].id, state.members[1].id, state.members[2].id], createdAt: new Date().toISOString() };
      const project2 = { id: uuid(), name: 'Mobile App v2', description: 'Next version of mobile app with new features and performance improvements', status: 'active', dueDate: '2026-05-20', memberIds: [state.members[0].id, state.members[1].id, state.members[4].id], createdAt: new Date().toISOString() };
      const project3 = { id: uuid(), name: 'API Integration', description: 'Integration with third-party APIs for enhanced functionality', status: 'on-hold', dueDate: '2026-06-01', memberIds: [state.members[1].id, state.members[3].id], createdAt: new Date().toISOString() };
      
      state.projects = [project1, project2, project3];

      // Tasks
      const taskTemplates = [
        { title: 'Design homepage mockup', desc: 'Create initial design concepts', status: 'done', priority: 'high' },
        { title: 'Implement navigation', desc: 'Build responsive navigation component', status: 'done', priority: 'medium' },
        { title: 'Setup CI/CD pipeline', desc: 'Configure automated deployments', status: 'inprogress', priority: 'high' },
        { title: 'Write unit tests', desc: 'Add tests for core functionality', status: 'inprogress', priority: 'medium' },
        { title: 'Fix login bug', desc: 'Resolve authentication issue on mobile', status: 'todo', priority: 'critical' },
        { title: 'Update documentation', desc: 'Document API endpoints', status: 'todo', priority: 'low' },
        { title: 'Performance optimization', desc: 'Improve page load times', status: 'inreview', priority: 'high' },
        { title: 'Security audit', desc: 'Review and fix security vulnerabilities', status: 'todo', priority: 'critical' },
        { title: 'Database migration', desc: 'Migrate to new schema', status: 'done', priority: 'high' },
        { title: 'User feedback review', desc: 'Analyze user feedback and prioritize', status: 'inprogress', priority: 'medium' },
        { title: 'API rate limiting', desc: 'Implement rate limiting for API', status: 'todo', priority: 'medium' },
        { title: 'Mobile responsive fixes', desc: 'Fix layout issues on mobile', status: 'inreview', priority: 'low' }
      ];

      taskTemplates.forEach((template, i) => {
        const project = state.projects[i % 3];
        const assignee = state.members[i % state.members.length];
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + (i % 14) - 3);
        
        state.tasks.push({
          id: uuid(),
          title: template.title,
          description: template.desc,
          projectId: project.id,
          assigneeId: assignee.id,
          status: template.status,
          priority: template.priority,
          dueDate: dueDate.toISOString().split('T')[0],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      });

      // Activity
      const activityTemplates = [
        'Created project "Website Redesign"',
        'Added Sarah Chen to Mobile App v2',
        'Completed task "Design homepage mockup"',
        'Created task "Fix login bug"',
        'Updated task status to "In Progress"',
        'Added new member David Lee',
        'Changed project status to "On Hold"',
        'Completed task "Database migration"',
        'Created task "Security audit"',
        'Assigned task to Emily Brown'
      ];

      activityTemplates.forEach((action, i) => {
        const date = new Date();
        date.setHours(date.getHours() - (i * 2));
        state.activity.push({
          id: uuid(),
          action,
          timestamp: date.toISOString(),
          entityType: i % 3 === 0 ? 'project' : 'task'
        });
      });

      saveState();
    }

    // ==================== ROUTING ====================
    function navigate(view, id = null) {
      state.currentView = view;
      state.currentProjectId = id;
      window.location.hash = id ? `${view}/${id}` : view;
      updateNavActive();
      render();
    }

    function handleHashChange() {
      const hash = window.location.hash.slice(1);
      const [view, id] = hash.split('/');
      
      if (view && document.querySelector(`[data-view="${view}"]`)) {
        state.currentView = view;
        state.currentProjectId = id || null;
        updateNavActive();
        render();
      } else if (!hash) {
        navigate('dashboard');
      }
    }

    function updateNavActive() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.view === state.currentView);
      });
    }

    // ==================== RENDERERS ====================
    function render() {
      const content = document.getElementById('content');
      const pageTitle = document.getElementById('pageTitle');
      
      const titles = {
        dashboard: 'Dashboard',
        projects: 'Projects',
        tasks: 'Tasks',
        team: 'Team',
        analytics: 'Analytics'
      };

      pageTitle.textContent = state.currentView === 'project' ? 'Project Details' : titles[state.currentView] || 'Dashboard';

      switch (state.currentView) {
        case 'dashboard':
          renderDashboard(content);
          break;
        case 'projects':
          renderProjects(content);
          break;
        case 'project':
          renderProjectDetail(content, state.currentProjectId);
          break;
        case 'tasks':
          renderTasks(content);
          break;
        case 'team':
          renderTeam(content);
          break;
        case 'analytics':
          renderAnalytics(content);
          break;
        default:
          renderDashboard(content);
      }

      // Update quick add button visibility
      const quickAddBtn = document.getElementById('quickAddBtn');
      quickAddBtn.style.display = state.currentView === 'dashboard' || state.currentView === 'tasks' || state.currentView === 'project' ? 'flex' : 'none';
    }

    function renderDashboard(container) {
      const totalProjects = state.projects.length;
      const openTasks = state.tasks.filter(t => t.status !== 'done').length;
      const teamMembers = state.members.length;
      const overdueTasks = state.tasks.filter(t => isOverdue(t.dueDate) && t.status !== 'done').length;

      const projectProgress = state.projects.slice(0, 3).map(p => {
        const projectTasks = state.tasks.filter(t => t.projectId === p.id);
        const completed = projectTasks.filter(t => t.status === 'done').length;
        const percent = projectTasks.length > 0 ? Math.round((completed / projectTasks.length) * 100) : 0;
        return { name: p.name, percent };
      });

      const recentActivity = state.activity.slice(0, 10);

      container.innerHTML = `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-card-header">
              <div>
                <div class="summary-card-value">${totalProjects}</div>
                <div class="summary-card-label">Total Projects</div>
              </div>
              <div class="summary-card-icon blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-card-header">
              <div>
                <div class="summary-card-value">${openTasks}</div>
                <div class="summary-card-label">Open Tasks</div>
              </div>
              <div class="summary-card-icon green">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                  <path d="M9 11l3 3L22 4"></path>
                  <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-card-header">
              <div>
                <div class="summary-card-value">${teamMembers}</div>
                <div class="summary-card-label">Team Members</div>
              </div>
              <div class="summary-card-icon orange">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                </svg>
              </div>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-card-header">
              <div>
                <div class="summary-card-value">${overdueTasks}</div>
                <div class="summary-card-label">Overdue Tasks</div>
              </div>
              <div class="summary-card-icon red">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="activity-feed">
            <h3>Recent Activity</h3>
            ${recentActivity.map(a => {
              const iconClass = a.entityType === 'project' ? 'blue' : 'green';
              return `
                <div class="activity-item">
                  <div class="activity-icon ${iconClass}" style="background: var(--bg-primary); color: var(--${iconClass === 'blue' ? 'info' : 'success'})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                  </div>
                  <div class="activity-content">
                    <div class="activity-text">${a.action}</div>
                    <div class="activity-time">${formatRelativeTime(a.timestamp)}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="activity-feed">
            <h3>Project Progress</h3>
            ${projectProgress.map(p => `
              <div style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                  <span style="font-weight: 500;">${p.name}</span>
                  <span style="color: var(--text-secondary);">${p.percent}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${p.percent}%"></div>
                </div>
              </div>
            `).join('')}
            <button class="btn btn-primary mt-20" onclick="navigate('projects')">View All Projects</button>
          </div>
        </div>
      `;
    }

    function renderProjects(container) {
      container.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <p style="color: var(--text-secondary);">Manage and track all your projects</p>
          <button class="btn btn-primary" onclick="openModal('project')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New Project
          </button>
        </div>
        <div class="cards-grid">
          ${state.projects.map(p => {
            const projectTasks = state.tasks.filter(t => t.projectId === p.id);
            const completed = projectTasks.filter(t => t.status === 'done').length;
            const percent = projectTasks.length > 0 ? Math.round((completed / projectTasks.length) * 100) : 0;
            const statusClass = p.status === 'active' ? 'badge-success' : p.status === 'completed' ? 'badge-info' : 'badge-warning';
            const projectMembers = state.members.filter(m => p.memberIds.includes(m.id));
            
            return `
              <div class="card" onclick="navigate('project', '${p.id}')">
                <div class="card-header">
                  <h3 class="card-title">${p.name}</h3>
                  <span class="badge ${statusClass}">${p.status}</span>
                </div>
                <p class="card-description">${p.description}</p>
                <div class="progress-container">
                  <div class="progress-label">
                    <span>Progress</span>
                    <span>${percent}%</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                  </div>
                </div>
                <div class="member-avatars">
                  ${projectMembers.map(m => `
                    <div class="member-avatar" style="background: ${m.color}">${getInitials(m.name)}</div>
                  `).join('')}
                </div>
                <div class="card-footer">
                  <span>Due: ${formatDate(p.dueDate)}</span>
                  <span>${projectTasks.length} tasks</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderProjectDetail(container, projectId) {
      const project = state.projects.find(p => p.id === projectId);
      if (!project) {
        container.innerHTML = '<p>Project not found</p>';
        return;
      }

      const projectTasks = state.tasks.filter(t => t.projectId === projectId);
      const projectMembers = state.members.filter(m => project.memberIds.includes(m.id));
      const statusClass = project.status === 'active' ? 'badge-success' : project.status === 'completed' ? 'badge-info' : 'badge-warning';

      const columns = [
        { id: 'todo', title: 'To Do', icon: '○' },
        { id: 'inprogress', title: 'In Progress', icon: '◐' },
        { id: 'inreview', title: 'In Review', icon: '◑' },
        { id: 'done', title: 'Done', icon: '●' }
      ];

      container.innerHTML = `
        <div style="margin-bottom: 20px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
            <div>
              <h2 style="font-size: 1.5rem; margin-bottom: 5px;">${project.name}</h2>
              <p style="color: var(--text-secondary);">${project.description}</p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
              <span class="badge ${statusClass}">${project.status}</span>
              <span style="color: var(--text-secondary);">Due: ${formatDate(project.dueDate)}</span>
              <button class="btn btn-secondary btn-sm" onclick="openModal('project', '${project.id}')">Edit</button>
            </div>
          </div>
          <div class="member-avatars">
            ${projectMembers.map(m => `
              <div class="member-avatar" style="background: ${m.color}; width: 40px; height: 40px; font-size: 0.9rem;">${getInitials(m.name)}</div>
            `).join('')}
          </div>
        </div>

        <div class="kanban-board" id="kanbanBoard">
          ${columns.map(col => {
            const colTasks = projectTasks.filter(t => t.status === col.id);
            return `
              <div class="kanban-column" data-status="${col.id}" 
                   ondragover="handleDragOver(event)" 
                   ondragleave="handleDragLeave(event)"
                   ondrop="handleDrop(event, '${col.id}')">
                <div class="kanban-column-header">
                  <span class="kanban-column-title">${col.icon} ${col.title}</span>
                  <span class="task-count">${colTasks.length}</span>
                </div>
                <button class="btn btn-secondary btn-sm" style="width: 100%; margin-bottom: 15px;" onclick="showInlineTaskForm('${col.id}')">
                  + Add Task
                </button>

    // ==================== CHART FUNCTIONS ====================
    function getTasksCompletedByWeek() {
      const weeks = {};
      const now = new Date();
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date(now);
        date.setDate(date.getDate() - i * 7);
        const weekStart = date.toISOString().split('T')[0];
        weeks[weekStart] = 0;
      }

      state.tasks.filter(t => t.status === 'done').forEach(t => {
        const completedDate = new Date(t.updatedAt);
        for (let i = 6; i >= 0; i--) {
          const weekStart = new Date(now);
          weekStart.setDate(weekStart.getDate() - i * 7);
          const weekEnd = new Date(weekStart);
          weekEnd.setDate(weekEnd.getDate() + 7);
          
          if (completedDate >= weekStart && completedDate < weekEnd) {
            weeks[weekStart.toISOString().split('T')[0]]++;
            break;
          }
        }
      });

      return weeks;
    }

    function getStatusDistribution() {
      return {
        todo: state.tasks.filter(t => t.status === 'todo').length,
        inprogress: state.tasks.filter(t => t.status === 'inprogress').length,
        inreview: state.tasks.filter(t => t.status === 'inreview').length,
        done: state.tasks.filter(t => t.status === 'done').length
      };
    }

    function getProjectCompletionRates() {
      return state.projects.map(p => {
        const projectTasks = state.tasks.filter(t => t.projectId === p.id);
        const completed = projectTasks.filter(t => t.status === 'done').length;
        return {
          name: p.name,
          rate: projectTasks.length > 0 ? (completed / projectTasks.length) * 100 : 0
        };
      });
    }

    function renderBarChart(data) {
      const canvas = document.getElementById('barChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const values = Object.values(data);
      const labels = Object.keys(data).map(d => {
        const date = new Date(d);
        return `${date.getMonth() + 1}/${date.getDate()}`;
      });

      const maxValue = Math.max(...values, 1);
      const barWidth = 40;
      const gap = 20;
      const chartWidth = values.length * (barWidth + gap);
      const chartHeight = 200;
      const padding = 50;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw axes
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, canvas.height - padding);
      ctx.lineTo(canvas.width - padding, canvas.height - padding);
      ctx.stroke();

      // Draw bars
      values.forEach((value, i) => {
        const x = padding + 20 + i * (barWidth + gap);
        const barHeight = (value / maxValue) * (chartHeight - 40);
        const y = canvas.height - padding - barHeight;

        const gradient = ctx.createLinearGradient(x, y, x, canvas.height - padding);
        gradient.addColorStop(0, '#6366f1');
        gradient.addColorStop(1, '#4f46e5');
        ctx.fillStyle = gradient;

        ctx.fillRect(x, y, barWidth, barHeight);

        // Draw value
        ctx.fillStyle = '#f1f5f9';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(value, x + barWidth / 2, y - 5);

        // Draw label
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(labels[i], x + barWidth / 2, canvas.height - padding + 20);
      });

      // Y-axis labels
      ctx.textAlign = 'right';
      for (let i = 0; i <= 5; i++) {
        const y = canvas.height - padding - (i / 5) * (chartHeight - 40);
        const value = Math.round((i / 5) * maxValue);
        ctx.fillText(value, padding - 10, y + 5);
      }
    }

    function renderPieChart(data) {
      const canvas = document.getElementById('pieChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const total = Object.values(data).reduce((a, b) => a + b, 0) || 1;

      const colors = {
        todo: '#3b82f6',
        inprogress: '#22c55e',
        inreview: '#f59e0b',
        done: '#6366f1'
      };

      const labels = {
        todo: 'To Do',
        inprogress: 'In Progress',
        inreview: 'In Review',
        done: 'Done'
      };

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let startAngle = -Math.PI / 2;
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = Math.min(centerX, centerY) - 40;

      Object.entries(data).forEach(([key, value]) => {
        const sliceAngle = (value / total) * 2 * Math.PI;
        
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = colors[key];
        ctx.fill();

        startAngle += sliceAngle;
      });

      // Draw center circle (donut)
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#1e293b';
      ctx.fill();

      // Draw legend
      let legendY = 50;
      Object.entries(data).forEach(([key, value]) => {
        ctx.fillStyle = colors[key];
        ctx.fillRect(10, legendY - 10, 15, 15);
        ctx.fillStyle = '#f1f5f9';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`${labels[key]}: ${value}`, 30, legendY);
        legendY += 25;
      });
    }

    function renderHorizontalBarChart(data) {
      const canvas = document.getElementById('horizontalBarChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const barHeight = 40;
      const gap = 20;
      const padding = 120;
      const maxBarWidth = canvas.width - padding - 50;

      data.forEach((item, i) => {
        const y = padding + i * (barHeight + gap);
        const barWidth = (item.rate / 100) * maxBarWidth;

        // Draw label
        ctx.fillStyle = '#f1f5f9';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(item.name, 10, y + barHeight / 2 + 5);

        // Draw bar background
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(padding, y, maxBarWidth, barHeight);

        // Draw bar
        const gradient = ctx.createLinearGradient(padding, y, padding + barWidth, y);
        gradient.addColorStop(0, '#6366f1');
        gradient.addColorStop(1, '#4f46e5');
        ctx.fillStyle = gradient;
        ctx.fillRect(padding, y, barWidth, barHeight);

        // Draw percentage
        ctx.fillStyle = '#f1f5f9';
        ctx.textAlign = 'left';
        ctx.fillText(`${Math.round(item.rate)}%`, padding + barWidth + 10, y + barHeight / 2 + 5);
      });
    }

    // ==================== FILTER & SORT ====================
    function getFilteredTasks() {
      return state.tasks.filter(t => {
        if (state.filters.project && t.projectId !== state.filters.project) return false;
        if (state.filters.assignee && t.assigneeId !== state.filters.assignee) return false;
        if (state.filters.priority && t.priority !== state.filters.priority) return false;
        if (state.filters.status && t.status !== state.filters.status) return false;
        return true;
      });
    }

    function sortTasks(tasks) {
      if (!state.sortColumn) return tasks;
      
      return [...tasks].sort((a, b) => {
        let aVal, bVal;
        
        switch (state.sortColumn) {
          case 'title': aVal = a.title; bVal = b.title; break;
          case 'project': 
            aVal = state.projects.find(p => p.id === a.projectId)?.name || '';
            bVal = state.projects.find(p => p.id === b.projectId)?.name || '';
            break;
          case 'assignee':
            aVal = state.members.find(m => m.id === a.assigneeId)?.name || '';
            bVal = state.members.find(m => m.id === b.assigneeId)?.name || '';
            break;
          case 'priority':
            const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
            aVal = priorityOrder[a.priority];
            bVal = priorityOrder[b.priority];
            break;
          case 'status': aVal = a.status; bVal = b.status; break;
          case 'dueDate': aVal = a.dueDate; bVal = b.dueDate; break;
          default: return 0;
        }

        if (typeof aVal === 'string') {
          return state.sortDirection === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        }
        return state.sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
      });
    }

    function sortTable(column) {
      if (state.sortColumn === column) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortColumn = column;
        state.sortDirection = 'asc';
      }
      render();
    }

    function getSortIcon(column) {
      if (state.sortColumn !== column) return '';
      return state.sortDirection === 'asc' ? '↑' : '↓';
    }

    function handleDragStart(event, taskId) {
      draggedTaskId = taskId;

    function handleDragEnd(event) {
      event.target.classList.remove('dragging');
      document.querySelectorAll('.kanban-column').forEach(col => {
        col.classList.remove('drag-over');
      });
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      event.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(event, newStatus) {
      event.preventDefault();
      event.currentTarget.classList.remove('drag-over');
      
      if (draggedTaskId) {
        const task = state.tasks.find(t => t.id === draggedTaskId);
        if (task && task.status !== newStatus) {
          task.status = newStatus;
          task.updatedAt = new Date().toISOString();
          saveState();
          logActivity(`Moved task "${task.title}" to ${newStatus}`, 'task');
          render();
        }
      }
      draggedTaskId = null;
    }

              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" class="form-input" id="taskDueDate" required>
          </div>
        `;

        footer.innerHTML = `
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveTask()">Create Task</button>
        `;
      }

      if (type === 'member') {
        title.textContent = 'Add Team Member';
        
        body.innerHTML = `
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="memberName" required>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <input type="text" class="form-input" id="memberRole" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="memberEmail" required>
          </div>
        `;

        footer.innerHTML = `
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveMember()">Add Member</button>
        `;
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }

    function saveProject(id) {
      const name = document.getElementById('projectName').value.trim();
      const description = document.getElementById('projectDesc').value.trim();
      const status = document.getElementById('projectStatus').value;
      const dueDate = document.getElementById('projectDueDate').value;
      const memberIds = Array.from(document.querySelectorAll('#modalBody input[type="checkbox"]:checked')).map(cb => cb.value);

      if (!name || !dueDate) {
        alert('Please fill in required fields');
        return;
      }

      if (id) {
        const project = state.projects.find(p => p.id === id);
        project.name = name;
        project.description = description;
        project.status = status;
        project.dueDate = dueDate;
        project.memberIds = memberIds;
        logActivity(`Updated project "${name}"`, 'project');
      } else {
        const newProject = {
          id: uuid(),
          name,
          description,
          status,
          dueDate,
          memberIds,
          createdAt: new Date().toISOString()
        };
        state.projects.push(newProject);
        logActivity(`Created project "${name}"`, 'project');
      }

      saveState();
      closeModal();
      render();
    }

    function saveTask() {
      const title = document.getElementById('taskTitle').value.trim();
      const description = document.getElementById('taskDesc').value.trim();
      const projectId = document.getElementById('taskProject').value;
      const assigneeId = document.getElementById('taskAssignee').value || null;
      const priority = document.getElementById('taskPriority').value;
      const dueDate = document.getElementById('taskDueDate').value;

      if (!title || !projectId || !dueDate) {
        alert('Please fill in required fields');
        return;
      }

      const newTask = {
        id: uuid(),
        title,
        description,
        projectId,
        assigneeId,
        status: 'todo',
        priority,
        dueDate,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      state.tasks.push(newTask);
      saveState();
      logActivity(`Created task "${title}"`, 'task');
      closeModal();
      render();
    }

    function saveMember() {
      const name = document.getElementById('memberName').value.trim();
      const role = document.getElementById('memberRole').value.trim();
      const email = document.getElementById('memberEmail').value.trim();

      if (!name || !role || !email) {
        alert('Please fill in all fields');
        return;
      }

      const colors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#3b82f6', '#8b5cf6', '#ec4899'];
      const newMember = {
        id: uuid(),
        name,
        role,
        email,
        color: colors[Math.floor(Math.random() * colors.length)]
      };

      state.members.push(newMember);
      saveState();
      logActivity(`Added new member ${name}`, 'member');
      closeModal();
      render();
    }

    // ==================== INLINE TASK FORM ====================
    function showInlineTaskForm(status) {
      document.getElementById(`inline-form-${status}`).classList.remove('hidden');
    }

    function hideInlineForm(status) {
      document.getElementById(`inline-form-${status}`).classList.add('hidden');
    }

    function addTask(status) {
      const title = document.getElementById(`task-title-${status}`).value.trim();
      const assigneeId = document.getElementById(`task-assignee-${status}`).value || null;
      const priority = document.getElementById(`task-priority-${status}`).value;

      if (!title || !state.currentProjectId) {
        alert('Please enter a task title');
        return;
      }

      const newTask = {
        id: uuid(),
        title,
        description: '',
        projectId: state.currentProjectId,
        assigneeId,
        status,
        priority,
        dueDate: new Date().toISOString().split('T')[0],
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      state.tasks.push(newTask);
      saveState();
      logActivity(`Created task "${title}"`, 'task');
      hideInlineForm(status);
      render();
    }

    // ==================== TASK DETAIL ====================
    function openTaskDetail(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      const project = state.projects.find(p => p.id === task.projectId);
      const assignee = state.members.find(m => m.id === task.assigneeId);
      const statusClass = task.status === 'done' ? 'badge-success' : task.status === 'inprogress' ? 'badge-info' : task.status === 'inreview' ? 'badge-warning' : 'badge-secondary';
      const statusLabel = task.status === 'done' ? 'Done' : task.status === 'inprogress' ? 'In Progress' : task.status === 'inreview' ? 'In Review' : 'To Do';

      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('sidePanel');
      const panelTitle = document.getElementById('sidePanelTitle');
      const panelContent = document.getElementById('sidePanelContent');

      panelTitle.textContent = 'Task Details';
      panelContent.innerHTML = `
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="detailTitle" value="${task.title}">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="detailDesc">${task.description || ''}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Project</label>
          <div style="color: var(--text-secondary);">${project?.name || '-'}</div>
        </div>
        <div class="form-group">
          <label class="form-label">Assignee</label>
          <select class="form-select" id="detailAssignee">
            <option value="">Unassigned</option>
            ${state.members.map(m => `<option value="${m.id}" ${m.id === task.assigneeId ? 'selected' : ''}>${m.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="detailPriority">
            <option value="low" ${task.priority === 'low' ? 'selected' : ''}>Low</option>
            <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
            <option value="high" ${task.priority === 'high' ? 'selected' : ''}>High</option>
            <option value="critical" ${task.priority === 'critical' ? 'selected' : ''}>Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="detailStatus">
            <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>To Do</option>
            <option value="inprogress" ${task.status === 'inprogress' ? 'selected' : ''}>In Progress</option>
            <option value="inreview" ${task.status === 'inreview' ? 'selected' : ''}>In Review</option>
            <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-input" id="detailDueDate" value="${task.dueDate}">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="btn btn-primary" style="flex: 1;" onclick="updateTask('${task.id}')">Save Changes</button>
          <button class="btn btn-danger" onclick="deleteTask('${task.id}'); closeSidePanel();">Delete</button>
        </div>
      `;

      overlay.classList.add('show');
      panel.classList.add('open');
    }

    function updateTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      task.title = document.getElementById('detailTitle').value.trim();
      task.description = document.getElementById('detailDesc').value.trim();
      task.assigneeId = document.getElementById('detailAssignee').value || null;
      task.priority = document.getElementById('detailPriority').value;
      task.status = document.getElementById('detailStatus').value;
      task.dueDate = document.getElementById('detailDueDate').value;
      task.updatedAt = new Date().toISOString();

      saveState();
      logActivity(`Updated task "${task.title}"`, 'task');
      closeSidePanel();
      render();
    }

    function deleteTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        logActivity(`Deleted task "${task.title}"`, 'task');
      }
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      saveState();
      render();
    }

    function toggleTaskStatus(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      const statusOrder = ['todo', 'inprogress', 'inreview', 'done'];
      const currentIndex = statusOrder.indexOf(task.status);
      task.status = statusOrder[(currentIndex + 1) % 4];
      task.updatedAt = new Date().toISOString();
      
      saveState();
      logActivity(`Updated task "${task.title}" status to ${task.status}`, 'task');
      render();
    }

    // ==================== SIDE PANEL ====================
    function openMemberPanel(memberId) {
      const member = state.members.find(m => m.id === memberId);
      if (!member) return;

      const memberTasks = state.tasks.filter(t => t.assigneeId === member.id);
      const activeTasks = memberTasks.filter(t => t.status !== 'done');
      const completedTasks = memberTasks.filter(t => t.status === 'done');

      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('sidePanel');
      const panelTitle = document.getElementById('sidePanelTitle');
      const panelContent = document.getElementById('sidePanelContent');

      panelTitle.textContent = member.name;
      panelContent.innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
          <div class="team-avatar" style="background: ${member.color}; width: 100px; height: 100px; font-size: 2rem; margin: 0 auto 15px;">${getInitials(member.name)}</div>
          <h3 style="font-size: 1.3rem;">${member.name}</h3>
          <p style="color: var(--accent);">${member.role}</p>
          <p style="color: var(--text-secondary);">${member.email}</p>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
          <div style="background: var(--bg-primary); padding: 15px; border-radius: 8px; text-align: center;">
            <div style="font-size: 1.5rem; font-weight: 700; color: var(--accent);">${activeTasks.length}</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">Active Tasks</div>
          </div>
          <div style="background: var(--bg-primary); padding: 15px; border-radius: 8px; text-align: center;">
            <div style="font-size: 1.5rem; font-weight: 700; color: var(--success);">${completedTasks.length}</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">Completed</div>
          </div>
        </div>

        <h4 style="margin-bottom: 15px;">Assigned Tasks</h4>
        ${memberTasks.length === 0 ? '<p style="color: var(--text-secondary);">No tasks assigned</p>' : memberTasks.map(t => {
          const project = state.projects.find(p => p.id === t.projectId);
          const statusClass = t.status === 'done' ? 'badge-success' : 'badge-secondary';
          return `
            <div style="background: var(--bg-primary); padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer;" onclick="openTaskDetail('${t.id}')">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: 500;">${t.title}</span>
                <span class="badge ${statusClass}">${t.status}</span>
              </div>
              <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary);">
                <span>${project?.name || '-'}</span>
                <span>Due: ${formatDate(t.dueDate)}</span>
              </div>
            </div>
          `;
        }).join('')}
      `;

      overlay.classList.add('show');
      panel.classList.add('open');
    }

    function closeSidePanel() {
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('sidePanel').classList.remove('open');
    }

    // ==================== SEARCH ====================
    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      const searchResults = document.getElementById('searchResults');

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        if (query.length < 2) {
          searchResults.classList.remove('show');
          return;
        }

        const results = [];

        // Search tasks
        state.tasks.forEach(t => {
          if (t.title.toLowerCase().includes(query)) {
            results.push({ type: 'task', id: t.id, title: t.title, subtitle: 'Task' });
          }
        });

        // Search projects
        state.projects.forEach(p => {
          if (p.name.toLowerCase().includes(query)) {
            results.push({ type: 'project', id: p.id, title: p.name, subtitle: 'Project' });
          }
        });

        // Search members
        state.members.forEach(m => {
          if (m.name.toLowerCase().includes(query)) {
            results.push({ type: 'member', id: m.id, title: m.name, subtitle: 'Team Member' });
          }
        });

        if (results.length > 0) {
          searchResults.innerHTML = results.slice(0, 8).map(r => `
            <div class="search-result-item" onclick="handleSearchResult('${r.type}', '${r.id}')">
              <div class="highlight">${r.title}</div>
              <div style="font-size: 0.8rem; color: var(--text-secondary);">${r.subtitle}</div>
            </div>
          `).join('');
          searchResults.classList.add('show');
        } else {
          searchResults.classList.remove('show');
        }
      });

      // Close search results on outside click
      document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
          searchResults.classList.remove('show');
        }
      });
    }

    function handleSearchResult(type, id) {
      document.getElementById('searchResults').classList.remove('show');
      document.getElementById('searchInput').value = '';
      
      if (type === 'project') {
        navigate('project', id);
      } else if (type === 'task') {
        openTaskDetail(id);
      } else if (type === 'member') {
        openMemberPanel(id);
      }
    }

    // ==================== EVENT LISTENERS ====================
    function setupEventListeners() {
      // Navigation
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const view = link.dataset.view;
          navigate(view);
        });
      });

      // Hamburger menu
      document.getElementById('hamburger').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });

      // Close sidebar on overlay click (mobile)
      document.getElementById('overlay').addEventListener('click', () => {
        closeSidePanel();
        closeModal();
        document.getElementById('sidebar').classList.remove('open');
      });

      // Modal close
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('sidePanelClose').addEventListener('click', closeSidePanel);

      // Quick add button
      document.getElementById('quickAddBtn').addEventListener('click', () => {
        if (state.currentView === 'project' && state.currentProjectId) {
          showInlineTaskForm('todo');
        } else {
          openModal('task');
        }
      });

      // Handle hash changes
      window.addEventListener('hashchange', handleHashChange);
    }

    // ==================== INITIALIZATION ====================
    function init() {
      loadState();
      setupEventListeners();
      setupSearch();
      handleHashChange();
      
      if (!window.location.hash) {
        navigate('dashboard');
      }
    }

    // Start the app
    init();
  </script>
</body>
</html>
